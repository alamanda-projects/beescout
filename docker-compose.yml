# =======================
# Project : BeeScout — Full Stack
# File    : docker-compose.yml
# Function: Production orchestrator (backend + frontend-user + frontend-admin + nginx + db)
#
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. docker compose up --build -d
#
# Networks:
#   public-net   → nginx ↔ backend ↔ frontend-user ↔ frontend-admin
#   internal-net → backend ↔ db (MongoDB never exposed to public-net)
# =======================

name: beescout

# ── Shared log rotation ──────────────────────────────────────────────────────
# Batasi ukuran log per container agar disk tidak penuh diam-diam (Issue #36
# bagian 8; terkait disk bloat #20). Tiap service memakai anchor ini via
# `logging: *default-logging`.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── Reverse Proxy & Security Gateway ──────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    logging: *default-logging
    ports:
      - "80:80"
      # Uncomment to enable HTTPS (mount your certs and extend nginx config):
      # - "443:443"
    environment:
      BEESCOUT_USER_DOMAIN:  ${BEESCOUT_USER_DOMAIN}
      BEESCOUT_ADMIN_DOMAIN: ${BEESCOUT_ADMIN_DOMAIN}
      BEESCOUT_RATE_LOGIN:   ${BEESCOUT_RATE_LOGIN:-10}
      BEESCOUT_RATE_API:     ${BEESCOUT_RATE_API:-30}
      # Tell envsubst which variables to substitute (prevents touching nginx's own $vars)
      NGINX_ENVSUBST_TEMPLATE_VARS: BEESCOUT_USER_DOMAIN,BEESCOUT_ADMIN_DOMAIN,BEESCOUT_RATE_LOGIN,BEESCOUT_RATE_API
    networks:
      - public-net
    depends_on:
      - backend
      - frontend-user
      - frontend-admin
    restart: unless-stopped

  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  # Not exposed to host — only reachable via nginx on public-net
  backend:
    build:
      context: .
      dockerfile: repository/infra/python/Dockerfile
    logging: *default-logging
    env_file:
      - .env
    environment:
      MONGODB_HOST: db
    networks:
      - public-net
      - internal-net
    depends_on:
      - db
    restart: unless-stopped

  # ── User Frontend (Next.js) ────────────────────────────────────────────────
  # Roles: user, developer
  frontend-user:
    build:
      context: ./frontend-user
      dockerfile: Dockerfile
    logging: *default-logging
    environment:
      # Browser-side API calls go to /api/* (same subdomain, routed by nginx)
      NEXT_PUBLIC_API_BASE: /api
      # Server-side (SSR) calls go directly to backend container
      API_INTERNAL_BASE: http://backend:8888
      NODE_ENV: production
    networks:
      - public-net
    restart: unless-stopped

  # ── Admin Frontend (Next.js) ───────────────────────────────────────────────
  # Roles: admin, root
  # Restrict access via nginx IP allowlist (see nginx/templates/default.conf.template)
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    logging: *default-logging
    environment:
      NEXT_PUBLIC_API_BASE: /api
      API_INTERNAL_BASE: http://backend:8888
      NODE_ENV: production
    networks:
      - public-net
    restart: unless-stopped

  # ── Database (MongoDB) ─────────────────────────────────────────────────────
  # Internal only — not accessible from public-net or host
  db:
    build:
      context: .
      dockerfile: repository/infra/mongodb/Dockerfile
      args:
        MONGODB_USER: ${MONGODB_USER}
        MONGODB_PASS: ${MONGODB_PASS}
    logging: *default-logging
    volumes:
      - beescout-data:/data/db
    networks:
      - internal-net
    restart: unless-stopped

volumes:
  beescout-data:

networks:
  # Shared network: nginx + frontends + backend
  public-net:
    driver: bridge

  # Isolated network: backend + db only (no outbound internet for db)
  internal-net:
    driver: bridge
    internal: true
